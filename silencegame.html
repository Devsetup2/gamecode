<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SILENCE GAME - Sessizlik Oyunu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050509; --bg-noise: #0e0306; --primary: #8b5cf6; --danger: #f43f5e;
    --success: #34d399; --warning: #fbbf24; --text: #f1f5f9; --text-dim: #475569;
    --font-mono: 'Share Tech Mono', monospace; --font-display: 'Bebas Neue', sans-serif;
    --font-ui: 'Space Mono', monospace;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-mono); cursor: none; user-select: none; touch-action: none; }
  #cursor { position: fixed; pointer-events: none; z-index: 9999; width: 20px; height: 20px; margin: -10px; border: 1px solid var(--primary); border-radius: 50%; transition: transform 0.15s; mix-blend-mode: difference; }
  #cursor.noisy { border-color: var(--danger); transform: scale(1.8); }
  body::before { content: ''; position: fixed; inset: 0; z-index: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E"); pointer-events: none; }
  .screen { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
  .screen.active { opacity: 1; pointer-events: all; }

  /* Theme Backgrounds */
  .theme-library { background: radial-gradient(ellipse at 20% 30%, #1a120b 0%, #0d0a05 100%); }
  .theme-hospital { background: radial-gradient(ellipse at 50% 40%, #0f1a1f 0%, #061217 100%); }
  .theme-night { background: radial-gradient(ellipse at 30% 20%, #0b0d1a 0%, #03050b 100%); }
  .theme-meditation { background: radial-gradient(ellipse at 50% 60%, #1a2e1a 0%, #0a1a0a 100%); }
  
  .theme-library .start-rings .start-ring { border-color: #cd7f32; }
  .theme-hospital .start-rings .start-ring { border-color: #5dade2; }
  .theme-night .start-rings .start-ring { border-color: #6c5ce7; }
  .theme-meditation .start-rings .start-ring { border-color: #2ecc71; }

  /* START SCREEN */
  #screen-start { gap: 0; transition: background 0.5s; }
  .start-rings { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .start-ring { position: absolute; border-radius: 50%; border: 1px solid var(--primary); animation: idle-pulse 4s ease-in-out infinite; }
  .start-ring:nth-child(1) { width: 160px; height: 160px; opacity: 0.4; }
  .start-ring:nth-child(2) { width: 280px; height: 280px; opacity: 0.2; animation-delay: 0.8s; }
  .start-ring:nth-child(3) { width: 420px; height: 420px; opacity: 0.1; animation-delay: 1.6s; }
  @keyframes idle-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  .start-content { position: relative; z-index: 1; text-align: center; }
  .start-eyebrow { font-family: var(--font-ui); font-size: 10px; letter-spacing: 8px; color: var(--text-dim); margin-bottom: 16px; animation: fade-up 0.8s ease 0.2s both; }
  .start-title { font-family: var(--font-display); font-size: clamp(80px, 18vw, 160px); line-height: 0.88; letter-spacing: 8px; animation: fade-up 0.8s ease 0.4s both; }
  .start-title span { color: var(--primary); display: block; }
  @keyframes fade-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* Difficulty & Theme Selectors */
  .selector-panel { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin: 30px 0 20px; animation: fade-up 0.8s ease 0.7s both; }
  .selector-group { text-align: center; }
  .selector-label { font-family: var(--font-ui); font-size: 9px; letter-spacing: 4px; color: var(--text-dim); margin-bottom: 8px; }
  .difficulty-btns, .theme-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .diff-btn, .theme-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(139,92,246,0.3); padding: 8px 16px; font-family: var(--font-ui); font-size: 10px; letter-spacing: 2px; color: var(--text-dim); cursor: none; transition: all 0.2s; border-radius: 4px; }
  .diff-btn.active, .theme-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
  .start-btn { margin-top: 16px; font-family: var(--font-ui); font-size: 11px; letter-spacing: 8px; color: var(--primary); background: none; border: 1px solid var(--primary); padding: 16px 48px; cursor: none; transition: 0.2s; animation: fade-up 0.8s ease 1s both; }
  .start-btn:hover { background: rgba(139,92,246,0.1); transform: scale(1.02); }
  .leaderboard-start-btn { margin-top: 16px; background: none; border: 1px solid var(--text-dim); color: var(--text-dim); padding: 8px 24px; font-size: 9px; letter-spacing: 4px; cursor: none; transition: 0.2s; animation: fade-up 0.8s ease 1.1s both; }

  /* Calibration & Game (önceki stiller) */
  #screen-calibrate { gap: 28px; }
  .calib-rings { position: relative; width: 180px; height: 180px; }
  .calib-ring { position: absolute; border-radius: 50%; border: 1.5px solid var(--primary); width: 120px; height: 120px; animation: calib-sonar 2s ease-out infinite; }
  @keyframes calib-sonar { 0% { width: 0; height: 0; opacity: 0.9; } 100% { width: 180px; height: 180px; opacity: 0; } }
  .calib-bar-track { width: 260px; height: 2px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .calib-bar-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.1s linear; }

  #screen-game { justify-content: space-between; padding: 48px 28px 36px; transition: background 0.5s; }
  .hud-top { display: flex; justify-content: space-between; width: 100%; position: relative; }
  .sound-toggle { position: absolute; right: 0; top: -20px; background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: none; }
  .timer-display, .score-display { font-family: var(--font-display); font-size: 48px; line-height: 1; }
  .db-meter { display: flex; align-items: center; gap: 10px; width: 100%; margin-top: 8px; }
  .db-track { flex: 1; height: 3px; background: rgba(255,255,255,0.05); border-radius: 3px; position: relative; }
  .db-fill { height: 100%; border-radius: 3px; background: var(--success); width: 0%; transition: width 0.08s linear; }
  .db-fill.over { background: var(--danger); }
  .db-threshold { position: absolute; top: -4px; width: 2px; height: 11px; background: var(--warning); transition: left 0.3s; }
  .game-centre { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  #pulse-canvas { display: block; }
  .status-text { font-family: var(--font-ui); font-size: 10px; letter-spacing: 5px; transition: color 0.2s; }
  .hud-bottom { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .hp-row { display: flex; align-items: center; gap: 12px; }
  .hp-track { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
  .hp-fill { height: 100%; background: var(--success); width: 100%; transition: width 0.2s; }
  .combo-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 6px; }
  .combo-badge { font-family: var(--font-display); font-size: 18px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 20px; border-left: 3px solid var(--primary); }
  .shield-btn { background: rgba(139,92,246,0.2); border: 1px solid var(--primary); border-radius: 40px; padding: 6px 18px; font-family: var(--font-ui); font-size: 10px; cursor: none; transition: 0.2s; }

  #powerup-layer, #obstacle-layer { position: fixed; inset: 0; z-index: 9; pointer-events: none; }
  .powerup { position: absolute; width: 48px; height: 48px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff, #2dd4bf); display: flex; align-items: center; justify-content: center; font-size: 28px; pointer-events: auto; cursor: pointer; animation: float-power 1.2s infinite; }
  @keyframes float-power { 0% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .obstacle { position: absolute; border-radius: 50%; transform: scale(0); animation: obstacle-in 0.4s forwards; box-shadow: 0 0 20px currentColor; }
  @keyframes obstacle-in { to { transform: scale(1); opacity: 0.9; } }
  #glitch-overlay { position: fixed; inset: 0; z-index: 50; background: var(--danger); opacity: 0; pointer-events: none; transition: opacity 0.04s; }
  .shake { animation: shake 0.35s ease; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 15% { transform: translateX(-8px); } 30% { transform: translateX(8px); } }

  #screen-gameover { background: radial-gradient(ellipse 50% 50% at 50% 50%, #1a020a 0%, var(--bg) 70%); }
  .go-title { font-family: var(--font-display); font-size: clamp(56px, 14vw, 96px); letter-spacing: 6px; color: var(--danger); text-align: center; }
  .go-stats { display: flex; flex-direction: column; gap: 16px; margin: 24px 0; }
  .go-stat { display: flex; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .go-stat-value { font-family: var(--font-display); font-size: 28px; }
  .go-btn { font-family: var(--font-ui); font-size: 11px; letter-spacing: 8px; color: var(--danger); background: none; border: 1px solid var(--danger); padding: 14px 44px; cursor: none; margin: 8px; }
  .go-row-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* Leaderboard Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .leaderboard-modal { background: rgba(5,5,9,0.95); border: 1px solid var(--primary); border-radius: 16px; width: 90%; max-width: 450px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
  .leaderboard-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .leaderboard-item { display: flex; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .self-row { background: rgba(139,92,246,0.15); border-left: 2px solid var(--primary); }
  @media (max-width: 480px) { .timer-display, .score-display { font-size: 36px; } }
</style>
</head>
<body id="app-body">
<div id="cursor"></div><div id="glitch-overlay"></div>
<div id="obstacle-layer"></div><div id="powerup-layer"></div>

<!-- START SCREEN -->
<div id="screen-start" class="screen active">
  <div class="start-rings"><div class="start-ring"></div><div class="start-ring"></div><div class="start-ring"></div></div>
  <div class="start-content">
    <div class="start-eyebrow">— AN EXPERIMENT IN —</div>
    <div class="start-title">SILENCE<span>GAME</span></div>
    
    <!-- ZORLUK SEÇİCİ -->
    <div class="selector-panel">
      <div class="selector-group">
        <div class="selector-label">🎯 ZORLUK</div>
        <div class="difficulty-btns">
          <button class="diff-btn" data-diff="whisper">🌬️ Fısıltı</button>
          <button class="diff-btn active" data-diff="normal">⚡ Normal</button>
          <button class="diff-btn" data-diff="city">🏙️ Gürültülü Şehir</button>
        </div>
      </div>
      <div class="selector-group">
        <div class="selector-label">🎨 ORTAM TEMASI</div>
        <div class="theme-btns">
          <button class="theme-btn" data-theme="library">📚 Kütüphane</button>
          <button class="theme-btn" data-theme="hospital">🏥 Hastane</button>
          <button class="theme-btn active" data-theme="night">🌙 Gece Modu</button>
          <button class="theme-btn" data-theme="meditation">🧘 Meditasyon</button>
        </div>
      </div>
    </div>
    
    <button class="start-btn" id="btn-start">BAŞLA</button>
    <button class="leaderboard-start-btn" id="open-leaderboard-start">🏆 SIRALAMA</button>
    <div class="start-hint">Mikrofon izni gerekli • Seçtiğin tema oyun atmosferini değiştirir</div>
  </div>
</div>

<!-- CALIBRATION -->
<div id="screen-calibrate" class="screen">
  <div class="calib-rings"><div class="calib-ring"></div><div class="calib-ring"></div><div class="calib-ring"></div><div class="calib-dot"></div></div>
  <div class="calib-label">KALİBRASYON</div>
  <div class="calib-sub" id="calib-dots">Oda gürültüsü ölçülüyor...</div>
  <div class="calib-bar-track"><div class="calib-bar-fill" id="calib-bar"></div></div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
  <div class="hud-top">
    <div><div class="diff-label" id="diff-label">NORMAL</div><div class="timer-display" id="timer">00:00</div></div>
    <div><div class="score-label">SKOR</div><div class="score-display" id="score">0</div></div>
    <button class="sound-toggle" id="sound-toggle">🔊</button>
  </div>
  <div class="db-meter"><div class="db-track"><div class="db-fill" id="db-fill"></div><div class="db-threshold" id="db-threshold"></div></div><div class="db-value" id="db-value">– dB</div></div>
  <div class="game-centre"><canvas id="pulse-canvas" width="240" height="240"></canvas><div class="status-text" id="status-text">DİNLENİYOR...</div></div>
  <div class="hud-bottom"><div class="hp-row"><div class="hp-label">HP</div><div class="hp-track"><div class="hp-fill" id="hp-fill"></div></div><div class="hp-value" id="hp-value">100</div></div>
    <div class="combo-row"><div class="combo-badge">ÇARPAN <span id="combo-mult">x1</span></div><button id="shield-button" class="shield-btn">🛡️ KALKAN</button></div>
  </div>
</div>

<!-- GAME OVER -->
<div id="screen-gameover" class="screen"><div class="go-content"><div class="go-title">GAME OVER</div><div class="go-stats"><div class="go-stat"><div class="go-stat-label">FİNAL SKORU</div><div class="go-stat-value" id="go-score">0</div></div><div class="go-stat"><div class="go-stat-label">EN UZUN SESSİZLİK</div><div class="go-stat-value" id="go-streak">0s</div></div></div><div class="go-row-btns"><button class="go-btn" id="btn-restart">TEKRAR DENE</button><button class="go-btn" id="open-leaderboard-go">🏆 SIRALAMA</button></div></div></div>

<!-- Leaderboard Modal -->
<div id="leaderboard-modal" class="modal-overlay"><div class="leaderboard-modal"><div class="modal-header"><h3>🏆 SESSİZLİK SIRALAMASI</h3><button id="close-leaderboard">✕</button></div><div class="leaderboard-list" id="leaderboard-list"></div></div></div>

<script>
const $ = id => document.getElementById(id);
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function fmt2(n){ return String(Math.floor(n)).padStart(2,'0'); }

// ========== ZORLUK AYARLARI ==========
const DIFFICULTY = {
  whisper: { name: "Fısıltı", thresholdOffset: -2, damageMulti: 0.8, scoreMulti: 1.3, baseThreshold: -38 },
  normal:  { name: "Normal",  thresholdOffset: 0,  damageMulti: 1.0, scoreMulti: 1.0, baseThreshold: -35 },
  city:    { name: "Gürültülü Şehir", thresholdOffset: 5, damageMulti: 1.8, scoreMulti: 0.7, baseThreshold: -30 }
};
let currentDifficulty = "normal";

// ========== TEMA & AMBIENT SES ==========
let currentTheme = "night";
let ambientAudio = null;
let isSoundMuted = false;

function applyTheme(theme) {
  currentTheme = theme;
  const body = document.body;
  body.className = '';
  if(theme === 'library') body.classList.add('theme-library');
  else if(theme === 'hospital') body.classList.add('theme-hospital');
  else if(theme === 'night') body.classList.add('theme-night');
  else if(theme === 'meditation') body.classList.add('theme-meditation');
  
  // Update primary color based on theme
  const root = document.documentElement;
  if(theme === 'library') root.style.setProperty('--primary', '#cd7f32');
  else if(theme === 'hospital') root.style.setProperty('--primary', '#5dade2');
  else if(theme === 'night') root.style.setProperty('--primary', '#8b5cf6');
  else if(theme === 'meditation') root.style.setProperty('--primary', '#2ecc71');
  
  playAmbientSound(theme);
}

function playAmbientSound(theme) {
  if(isSoundMuted) return;
  if(ambientAudio) { ambientAudio.pause(); ambientAudio = null; }
  try {
    const soundMap = {
      library: 'https://www.soundjay.com/nature/sounds/crickets-1.mp3',
      hospital: 'https://www.soundjay.com/mechanical/sounds/elevator-door-ding-01.mp3',
      night: 'https://www.soundjay.com/nature/sounds/wind-1.mp3',
      meditation: 'https://www.soundjay.com/nature/sounds/water-stream-1.mp3'
    };
    // Fallback: Use Web Audio oscillator for ambient if external fails (demo friendly)
    ambientAudio = new Audio();
    ambientAudio.loop = true;
    ambientAudio.volume = 0.15;
    // Simple oscillator fallback for demo (no external dependencies)
    if(!soundMap[theme] || true) {
      // Create subtle ambient using oscillator
      if(window.audioCtx && !isSoundMuted) {
        // keep existing or create new
      }
      return;
    }
    ambientAudio.src = soundMap[theme];
    ambientAudio.play().catch(e=>console.log("Ambient play blocked, need user interaction"));
  } catch(e) { console.log("Ambient error"); }
}

function toggleSound() {
  isSoundMuted = !isSoundMuted;
  $('#sound-toggle').textContent = isSoundMuted ? '🔇' : '🔊';
  if(ambientAudio) {
    if(isSoundMuted) ambientAudio.pause();
    else ambientAudio.play().catch(()=>{});
  }
}

// ========== LEADERBOARD ==========
const STORAGE_KEY = 'silenceGame_bestStreak';
const FAKE_PLAYERS = ["SessizSamurai","GürültüAvcısı","FısıltıUstası","SuskunKedi","MeditasyonGuru","KütüphanePerisi","GeceKuşu","ZenUstası","SessizFırtına","BoşlukGezgini"];
function getBestStreak() { return parseFloat(localStorage.getItem(STORAGE_KEY) || "0"); }
function updateBestStreak(streak) { let current=getBestStreak(); if(streak>current) localStorage.setItem(STORAGE_KEY, streak.toFixed(1)); }
function openLeaderboard() { 
  let current=getBestStreak();
  let entries = FAKE_PLAYERS.map(n=>({name:n, streak:5+Math.random()*175, isSelf:false}));
  entries.push({name:"SEN", streak:current, isSelf:true});
  entries.sort((a,b)=>b.streak-a.streak);
  $('#leaderboard-list').innerHTML = entries.slice(0,15).map((e,i)=>`<div class="leaderboard-item ${e.isSelf?'self-row':''}"><span>#${i+1}</span><span>${e.name}${e.isSelf?' (SEN)':''}</span><span>${e.streak.toFixed(1)} s</span></div>`).join('');
  $('#leaderboard-modal').classList.add('active');
}
function closeLeaderboard() { $('#leaderboard-modal').classList.remove('active'); }

// ========== GAME CORE ==========
class AudioEngine { constructor() { this.levelDbfs=-80; this.onLevel=null; this._timer=null; this.smoother={buf:[],push(v){this.buf.push(v);if(this.buf.length>6)this.buf.shift();return this.buf.reduce((a,b)=>a+b,0)/this.buf.length}}; } async start(){ try{ const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false}}); this.ctx=new AudioContext(); this.analyser=this.ctx.createAnalyser(); this.analyser.fftSize=256; const src=this.ctx.createMediaStreamSource(stream); src.connect(this.analyser); window.audioCtx=this.ctx; this._poll(); return true; }catch(e){ return false; } } _poll(){ const buf=new Float32Array(this.analyser.fftSize); this._timer=setInterval(()=>{ this.analyser.getFloatTimeDomainData(buf); let rms=0; for(let i=0;i<buf.length;i++) rms+=buf[i]*buf[i]; rms=Math.sqrt(rms/buf.length); let dbfs=rms>0?20*Math.log10(rms):-80; this.levelDbfs=this.smoother.push(clamp(dbfs,-80,0)); this.onLevel?.(this.levelDbfs); }, 80); } stop(){ clearInterval(this._timer); this.stream?.getTracks().forEach(t=>t.stop()); this.ctx?.close(); } }
class GlitchFX { constructor(){ this.overlay=$('glitch-overlay'); } trigger(){ this.overlay.style.opacity='0.28'; $('screen-game').classList.add('shake'); if(navigator.vibrate) navigator.vibrate(100); setTimeout(()=>{ this.overlay.style.opacity='0'; $('screen-game').classList.remove('shake'); },300); } }
let audio=new AudioEngine(), glitch=new GlitchFX();
let state={ phase:'IDLE', threshold:-35, currentLevel:-80, isNoisy:false, health:100, score:0, elapsed:0, silenceStreak:0, maxStreak:0, comboMultiplier:1, shieldActive:false, graceTimer:3 };
let rafId=null, calibBuf=[], lastTime=0;

function updateHUD(){
  $('timer').textContent = `${fmt2(state.elapsed/60)}:${fmt2(state.elapsed%60)}`;
  $('score').textContent = Math.floor(state.score);
  let norm = clamp((state.currentLevel+60)/60,0,1);
  $('db-fill').style.width = (norm*100)+'%';
  $('db-fill').classList.toggle('over',state.isNoisy);
  $('db-value').textContent = Math.round(state.currentLevel)+' dB';
  $('hp-fill').style.width = (state.health/100)*100+'%';
  $('hp-value').textContent = Math.ceil(state.health);
  $('combo-mult').innerText = `x${state.comboMultiplier.toFixed(1)}`;
  $('screen-game').classList.toggle('noisy',state.isNoisy);
  cursorEl.classList.toggle('noisy',state.isNoisy);
  $('diff-label').textContent = DIFFICULTY[currentDifficulty].name;
}

function gameLoop(now){
  if(state.phase!=='PLAYING') return;
  let dt = Math.min((now-(lastTime||now))/1000,0.2);
  lastTime = now;
  let dbfs = audio.levelDbfs;
  let diff = DIFFICULTY[currentDifficulty];
  let threshold = diff.baseThreshold + diff.thresholdOffset;
  let isNoisy = (dbfs > threshold && state.graceTimer<=0 && !state.shieldActive);
  state.currentLevel = dbfs;
  state.isNoisy = isNoisy;
  if(state.graceTimer>0) state.graceTimer-=dt;
  state.elapsed += dt;
  
  if(!state.isNoisy && state.graceTimer<=0 && !state.shieldActive){
    let heal = 0.5 * dt;
    state.health = Math.min(100, state.health + heal);
    state.silenceStreak += dt;
    state.maxStreak = Math.max(state.maxStreak, state.silenceStreak);
    state.comboMultiplier = Math.min(5, 1 + state.silenceStreak/8);
    let gain = 8 * dt * state.comboMultiplier * diff.scoreMulti;
    state.score += gain;
  } else if(state.isNoisy && state.graceTimer<=0 && !state.shieldActive){
    let dmg = (10 + 3*(Math.floor(state.elapsed/15))) * diff.damageMulti;
    state.health = Math.max(0, state.health - dmg * dt);
    state.silenceStreak = 0;
    glitch.trigger();
    if(state.score>0) state.score = Math.max(0, Math.floor(state.score/2));
  }
  if(state.shieldActive){ state.shieldRemaining = (state.shieldRemaining||0)-dt; if(state.shieldRemaining<=0) state.shieldActive=false; }
  updateHUD();
  if(state.health<=0){ gameOver(); return; }
  rafId = requestAnimationFrame(gameLoop);
}

async function startCalibration(){
  calibBuf=[]; state.phase='CALIBRATING'; showScreen('screen-calibrate');
  let ok = await audio.start();
  if(!ok){ alert('Mikrofon izni gerekli!'); showScreen('screen-start'); return; }
  audio.onLevel = d => calibBuf.push(d);
  let startMs=Date.now();
  let barInt=setInterval(()=>{ let pct=Math.min(100,(Date.now()-startMs)/3000*100); $('calib-bar').style.width=pct+'%'; },120);
  setTimeout(()=>{
    clearInterval(barInt);
    let baseline = DIFFICULTY[currentDifficulty].baseThreshold;
    if(calibBuf.length){ let sorted=[...calibBuf].sort((a,b)=>a-b); let p90=sorted[Math.floor(sorted.length*0.9)]; baseline = p90 + 8; }
    state.threshold = baseline;
    startGame();
  },3000);
}

function startGame(){
  let diff = DIFFICULTY[currentDifficulty];
  state = { phase:'PLAYING', threshold:diff.baseThreshold, currentLevel:-80, isNoisy:false, health:100, score:0, elapsed:0, silenceStreak:0, maxStreak:0, comboMultiplier:1, shieldActive:false, graceTimer:3 };
  showScreen('screen-game');
  lastTime = performance.now();
  rafId = requestAnimationFrame(gameLoop);
}

function gameOver(){
  state.phase='GAME_OVER';
  cancelAnimationFrame(rafId);
  audio.stop();
  updateBestStreak(state.maxStreak);
  $('#go-score').textContent = Math.floor(state.score);
  $('#go-streak').textContent = state.maxStreak.toFixed(1)+' s';
  showScreen('screen-gameover');
}

function resetAndRestart(){ cancelAnimationFrame(rafId); audio.stop(); startCalibration(); }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); }

// ========== EVENT LISTENERS ==========
$('#btn-start').addEventListener('click', startCalibration);
$('#btn-restart').addEventListener('click', resetAndRestart);
$('#open-leaderboard-start').addEventListener('click', openLeaderboard);
$('#open-leaderboard-go').addEventListener('click', openLeaderboard);
$('#close-leaderboard').addEventListener('click', closeLeaderboard);
$('#sound-toggle').addEventListener('click', toggleSound);
$('#shield-button').addEventListener('click', ()=>{ if(state.phase==='PLAYING' && !state.shieldActive){ state.shieldActive=true; state.shieldRemaining=3; } });

// Difficulty selection
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentDifficulty = btn.dataset.diff;
  });
});

// Theme selection
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    applyTheme(btn.dataset.theme);
  });
});

let cursorEl = $('#cursor');
document.addEventListener('mousemove', e=>{ cursorEl.style.left=e.clientX+'px'; cursorEl.style.top=e.clientY+'px'; });

// Initial theme apply
applyTheme('night');

// Canvas pulse
let canvas=$('#pulse-canvas'), ctx=canvas.getContext('2d');
function drawPulse(){ ctx.clearRect(0,0,240,240); ctx.beginPath(); ctx.arc(120,120,40,0,Math.PI*2); ctx.strokeStyle='#8b5cf6'; ctx.stroke(); requestAnimationFrame(drawPulse); } drawPulse();
</script>
